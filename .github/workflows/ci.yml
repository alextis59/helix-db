name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_OFFLINE: "true"
  CARGO_TERM_COLOR: always

jobs:
  contract:
    name: Matrix contract
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      node: ${{ steps.matrix.outputs.node }}
      native: ${{ steps.matrix.outputs.native }}
      portable: ${{ steps.matrix.outputs.portable }}
      sanitizer: ${{ steps.matrix.outputs.sanitizer }}
      browser: ${{ steps.matrix.outputs.browser }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select contract Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
          package-manager-cache: false
      - name: Validate clean bootstrap contract
        run: |
          corepack npm run bootstrap:check
          corepack npm run bootstrap:test
      - name: Fetch the exact locked Rust graph for offline contract checks
        env:
          CARGO_NET_OFFLINE: "false"
        run: cargo fetch --locked
      - name: Validate CI contract
        run: node tests/toolchain/check-ci-matrix.mjs
      - name: Emit gating matrices
        id: matrix
        shell: bash
        run: node tests/toolchain/emit-ci-matrix.mjs gating >> "$GITHUB_OUTPUT"

  node:
    name: Node ${{ matrix.node }} / Linux x64
    needs: contract
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.contract.outputs.node) }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Verify runner identity
        run: node tests/toolchain/check-ci-runtime.mjs ${{ matrix.id }}
      - name: Install locked JavaScript tools without lifecycle scripts
        run: corepack npm ci --ignore-scripts
      - name: Fetch the exact locked Rust graph for offline policy checks
        env:
          CARGO_NET_OFFLINE: "false"
        run: cargo fetch --locked
      - name: Run JavaScript and dependency policy
        run: |
          corepack npm run policy:javascript
          corepack npm run policy:dependencies
          corepack npm run core:boundary:check
          corepack npm run core:boundary:test
          corepack npm run host:capabilities:check
          corepack npm run host:capabilities:test
          corepack npm run storage:batch:check
          corepack npm run storage:batch:test
          corepack npm run resources:lifecycle:check
          corepack npm run resources:lifecycle:test
          corepack npm run rust:dependencies:test
          corepack npm run rust:audit:test
          corepack npm run dependencies:check
          corepack npm run toolchain:types
      - name: Refresh dependency vulnerability and provenance observation
        if: matrix.node == '22.23.1'
        env:
          CARGO_NET_OFFLINE: "false"
        run: |
          corepack npm run rust:audit:install
          corepack npm run dependencies:report
      - name: Run deterministic fixture checks
        run: |
          corepack npm run fixtures:check
          corepack npm run wgsl:check
      - name: Install the exact coverage-guided fuzz toolchain
        env:
          CARGO_NET_OFFLINE: "false"
        run: |
          rustup toolchain install nightly-2026-06-30 --profile minimal
          cargo install cargo-fuzz --locked --version 0.13.2
          cargo +nightly-2026-06-30 fetch --locked --manifest-path fuzz/Cargo.toml
          corepack npm run fuzz:policy
          corepack npm run fuzz:test
      - name: Run aggregate tests
        run: corepack npm test
      - name: Collect immutable HDoc golden formats
        if: always() && matrix.node == '22.23.1'
        run: corepack npm run artifacts:golden-formats
      - name: Retain immutable HDoc golden formats
        if: always() && matrix.node == '22.23.1'
        id: upload-golden-formats
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: golden-formats-hdoc-v1-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/retention/golden-formats/hdoc-v1/
          if-no-files-found: error
          retention-days: 90
          compression-level: 9
          overwrite: false
          include-hidden-files: false
          archive: true
      - name: Collect semantic replay and dependency reports
        if: always() && matrix.node == '22.23.1'
        run: corepack npm run artifacts:test-replay
      - name: Retain semantic replay and dependency reports
        if: always() && matrix.node == '22.23.1'
        id: upload-semantic-replay
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-replays-semantic-node-${{ matrix.node }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/retention/test-replays/semantic/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9
          overwrite: false
          include-hidden-files: false
          archive: true

  native:
    name: Native / ${{ matrix.id }}
    needs: contract
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.contract.outputs.native) }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select contract Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Verify runner and Rust identities
        run: |
          node tests/toolchain/check-ci-runtime.mjs ${{ matrix.id }}
          rustc --version --verbose
          cargo --version --verbose
      - name: Fetch the exact locked Rust graph
        env:
          CARGO_NET_OFFLINE: "false"
        run: cargo fetch --locked
      - name: Run strict native workspace checks
        run: |
          cargo fmt --all -- --check
          cargo check --frozen --workspace --all-targets --all-features
          cargo clippy --frozen --workspace --all-targets --all-features -- -D warnings
          cargo test --frozen --workspace --all-features --no-fail-fast
          corepack npm run examples:native
      - name: Enforce Rust product coverage thresholds
        if: matrix.id == 'linux-x64'
        run: node tests/toolchain/check-rust-coverage.mjs run
      - name: Build warning-free documentation
        if: matrix.id == 'linux-x64'
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --frozen --workspace --no-deps --all-features
      - name: Collect Rust coverage replay
        if: always() && matrix.id == 'linux-x64'
        run: corepack npm run artifacts:coverage-replay
      - name: Retain Rust coverage replay
        if: always() && matrix.id == 'linux-x64'
        id: upload-coverage-replay
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-replays-coverage-${{ matrix.id }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/retention/test-replays/coverage/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9
          overwrite: false
          include-hidden-files: false
          archive: true

  portable:
    name: Portable Rust / ${{ matrix.target }}
    needs: contract
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.contract.outputs.portable) }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select contract Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Verify runner identity
        run: node tests/toolchain/check-ci-runtime.mjs ${{ matrix.id }}
      - name: Fetch the exact locked Rust graph
        env:
          CARGO_NET_OFFLINE: "false"
        run: cargo fetch --locked
      - name: Compile portable core with strict lints
        run: cargo clippy --frozen --target ${{ matrix.target }} --package helix-core -- -D warnings
      - name: Build and validate portable artifact
        run: |
          if [ "${{ matrix.artifact }}" = "component" ]; then
            corepack npm run wasm:abi:check
            corepack npm run wasm:abi:test
            corepack npm run host:capabilities:check
            corepack npm run host:capabilities:test
            corepack npm run storage:batch:check
            corepack npm run storage:batch:test
            corepack npm run resources:lifecycle:check
            corepack npm run resources:lifecycle:test
          fi
          node tests/toolchain/check-wasm-artifacts.mjs ${{ matrix.artifact }}

  sanitizer:
    name: Sanitizer / ${{ matrix.id }}
    needs: contract
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.contract.outputs.sanitizer) }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select contract Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Verify runner identity
        run: node tests/toolchain/check-ci-runtime.mjs ${{ matrix.id }}
      - name: Fetch the exact locked Rust graph
        env:
          CARGO_NET_OFFLINE: "false"
        run: cargo fetch --locked
      - name: Compile the fully instrumented ASan target
        run: node tests/toolchain/run-build-profile.mjs sanitizer

  browser:
    name: Browser bundle smoke / ${{ matrix.engine }}
    needs: contract
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.contract.outputs.browser) }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Verify runner identity
        run: node tests/toolchain/check-ci-runtime.mjs ${{ matrix.id }}
      - name: Install locked browser harness without lifecycle scripts
        run: corepack npm ci --ignore-scripts
      - name: Fetch the exact locked Rust graph
        env:
          CARGO_NET_OFFLINE: "false"
        run: cargo fetch --locked
      - name: Install the Playwright-coupled browser and operating-system dependencies
        run: corepack npm exec -- playwright install --with-deps ${{ matrix.engine }}
      - name: Parse, validate, and compile trusted WGSL fixtures
        if: matrix.engine == 'chromium'
        run: corepack npm run wgsl:validate
      - name: Build and execute the browser bundle smoke
        run: corepack npm run ci:browser-smoke -- ${{ matrix.engine }}
      - name: Collect browser execution and validation reports
        if: always()
        run: corepack npm run artifacts:browser-report -- ${{ matrix.engine }}
      - name: Retain browser execution and validation reports
        if: always()
        id: upload-browser-reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-reports-${{ matrix.engine }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/retention/browser-reports/${{ matrix.engine }}/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9
          overwrite: false
          include-hidden-files: false
          archive: true
