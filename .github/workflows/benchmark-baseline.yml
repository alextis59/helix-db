name: Benchmark Baseline

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmark-baseline-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_OFFLINE: "true"
  CARGO_TERM_COLOR: always

jobs:
  baseline:
    name: Observational harness baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select contract Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
          package-manager-cache: false
      - name: Verify runtime and CI contract
        run: |
          node tests/toolchain/check-ci-runtime.mjs benchmark-baseline-linux-x64
          node tests/toolchain/check-ci-matrix.mjs
      - name: Install locked JavaScript tools without lifecycle scripts
        run: corepack npm ci --ignore-scripts
      - name: Validate dependency and benchmark authorities
        run: |
          corepack npm run policy:dependencies
          corepack npm run benchmark:schemas
      - name: Run integrity-only benchmark baseline
        run: corepack npm run test:benchmark
      - name: Preserve raw results and summary
        if: always()
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-baseline-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/benchmarks/baseline/
          if-no-files-found: error
          retention-days: 30
          compression-level: 9
          overwrite: false
          include-hidden-files: false
          archive: true
