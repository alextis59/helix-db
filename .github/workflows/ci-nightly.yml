name: CI Nightly

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_NET_OFFLINE: "true"
  CARGO_TERM_COLOR: always

jobs:
  contract:
    name: Nightly matrix contract
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      native: ${{ steps.matrix.outputs.native }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select contract Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.1
          package-manager-cache: false
      - name: Validate CI contract
        run: node tests/toolchain/check-ci-matrix.mjs
      - name: Emit nightly matrices
        id: matrix
        shell: bash
        run: node tests/toolchain/emit-ci-matrix.mjs nightly >> "$GITHUB_OUTPUT"

  native:
    name: Nightly native / ${{ matrix.id }}
    needs: contract
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.contract.outputs.native) }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Select contract Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Verify runner and Rust identities
        run: |
          node tests/toolchain/check-ci-runtime.mjs ${{ matrix.id }}
          rustc --version --verbose
          cargo --version --verbose
      - name: Run strict native workspace checks
        run: |
          cargo fmt --all -- --check
          cargo check --frozen --workspace --all-targets --all-features
          cargo clippy --frozen --workspace --all-targets --all-features -- -D warnings
          cargo test --frozen --workspace --all-features --no-fail-fast
          corepack npm run examples:native
